openapi: 3.1.0
info:
  title: Api
  version: 0.1.0
  description: FitBuddy API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: users
    description: User and sync operations
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /users/register:
    post:
      operationId: registerUser
      tags: [users]
      summary: Register user
      description: Registers a new user device.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegisterRequest"
      responses:
        "201":
          description: Registered successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RegisterResponse"

  /users/login:
    post:
      operationId: loginUser
      tags: [users]
      summary: Login user
      description: Authenticates a user and returns their profile.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginRequest"
      responses:
        "200":
          description: Logged in successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LoginResponse"
        "401":
          description: Invalid credentials

  /users/{userId}/data:
    get:
      operationId: getUserData
      tags: [users]
      summary: Get all user data
      description: Fetches the entire synchronized state for a user.
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserDataResponse"

  /users/{userId}/sync:
    post:
      operationId: syncUserData
      tags: [users]
      summary: Sync user data
      description: Upserts offline-logged changes from the client to the database.
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SyncRequest"
      responses:
        "200":
          description: Synced successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SyncResponse"

  /users/{userId}/push-token:
    post:
      operationId: updatePushToken
      tags: [users]
      summary: Update Expo Push Token
      description: Stores the device's push token.
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PushTokenRequest"
      responses:
        "200":
          description: Token updated successfully

  /users/{userId}/test-push:
    post:
      operationId: testPushNotification
      tags: [users]
      summary: Test Push Notification
      description: Sends an immediate push notification to the user's stored token for testing.
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Push sent successfully

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    RegisterRequest:
      type: object
      properties:
        name:
          type: string
        email:
          type: string
          format: email
        password:
          type: string
          minLength: 6
        startDate:
          type: string
        wakeTime:
          type: string
        bedTime:
          type: string
      required:
        - name

    LoginRequest:
      type: object
      properties:
        email:
          type: string
          format: email
        password:
          type: string
      required:
        - email
        - password

    LoginResponse:
      type: object
      properties:
        userId:
          type: string
          format: uuid
        onboardingComplete:
          type: boolean
        profile:
          $ref: "#/components/schemas/UserProfileSync"
      required:
        - userId
        - onboardingComplete
        - profile

    RegisterResponse:
      type: object
      properties:
        userId:
          type: string
          format: uuid
        profile:
          $ref: "#/components/schemas/UserProfileSync"
      required:
        - userId
        - profile

    UserProfileSync:
      type: object
      properties:
        name:
          type: string
        wakeTime:
          type: string
        bedTime:
          type: string
        startDate:
          type: string
        totalXP:
          type: integer
        highestStreak:
          type: integer
        onboardingComplete:
          type: boolean
        activeProgramIds:
          type: array
          items:
            type: string
        savedProgramIds:
          type: array
          items:
            type: string
      required:
        - name
        - wakeTime
        - bedTime
        - startDate
        - totalXP
        - highestStreak
        - onboardingComplete
        - activeProgramIds
        - savedProgramIds

    ExerciseSync:
      type: object
      properties:
        id:
          type: string
          format: uuid
        userId:
          type: string
          format: uuid
          nullable: true
        name:
          type: string
        muscleGroup:
          type: string
        equipment:
          type: string
          nullable: true
      required:
        - id
        - name
        - muscleGroup

    ProgramSync:
      type: object
      properties:
        id:
          type: string
        userId:
          type: string
          format: uuid
          nullable: true
        title:
          type: string
        description:
          type: string
          nullable: true
        isTemplate:
          type: boolean
        color:
          type: string
        emoji:
          type: string
      required:
        - id
        - title
        - isTemplate
        - color
        - emoji

    WorkoutDaySync:
      type: object
      properties:
        id:
          type: string
          format: uuid
        programId:
          type: string
        dayNumber:
          type: integer
        title:
          type: string
        targetMuscleGroups:
          type: array
          items:
            type: string
      required:
        - id
        - programId
        - dayNumber
        - title
        - targetMuscleGroups

    WorkoutDayExerciseSync:
      type: object
      properties:
        id:
          type: string
          format: uuid
        workoutDayId:
          type: string
          format: uuid
        exerciseId:
          type: string
          format: uuid
        sortOrder:
          type: integer
        targetSets:
          type: integer
        targetReps:
          type: integer
        targetRpe:
          type: integer
          nullable: true
      required:
        - id
        - workoutDayId
        - exerciseId
        - sortOrder
        - targetSets
        - targetReps

    WorkoutSessionSync:
      type: object
      properties:
        id:
          type: string
          format: uuid
        userId:
          type: string
          format: uuid
        workoutDayId:
          type: string
          format: uuid
          nullable: true
        startedAt:
          type: string
          format: date-time
        completedAt:
          type: string
          format: date-time
          nullable: true
        volumeScore:
          type: integer
      required:
        - id
        - userId
        - startedAt
        - volumeScore

    ExerciseLogSync:
      type: object
      properties:
        id:
          type: string
          format: uuid
        workoutSessionId:
          type: string
          format: uuid
        exerciseId:
          type: string
          format: uuid
        setNumber:
          type: integer
        weight:
          type: number
        reps:
          type: integer
        rpe:
          type: integer
          nullable: true
        isPr:
          type: boolean
      required:
        - id
        - workoutSessionId
        - exerciseId
        - setNumber
        - weight
        - reps
        - isPr

    JournalSync:
      type: object
      properties:
        id:
          type: string
          format: uuid
        userId:
          type: string
          format: uuid
        date:
          type: string
        content:
          type: string
        mood:
          type: string
          nullable: true
      required:
        - id
        - userId
        - date
        - content

    UserDataResponse:
      type: object
      properties:
        profile:
          $ref: "#/components/schemas/UserProfileSync"
        exercises:
          type: array
          items:
            $ref: "#/components/schemas/ExerciseSync"
        programs:
          type: array
          items:
            $ref: "#/components/schemas/ProgramSync"
        workoutDays:
          type: array
          items:
            $ref: "#/components/schemas/WorkoutDaySync"
        workoutDayExercises:
          type: array
          items:
            $ref: "#/components/schemas/WorkoutDayExerciseSync"
        workoutSessions:
          type: array
          items:
            $ref: "#/components/schemas/WorkoutSessionSync"
        exerciseLogs:
          type: array
          items:
            $ref: "#/components/schemas/ExerciseLogSync"
        journals:
          type: array
          items:
            $ref: "#/components/schemas/JournalSync"
      required:
        - profile
        - exercises
        - programs
        - workoutDays
        - workoutDayExercises
        - workoutSessions
        - exerciseLogs
        - journals

    SyncRequest:
      type: object
      properties:
        profile:
          $ref: "#/components/schemas/UserProfileSync"
        exercises:
          type: array
          items:
            $ref: "#/components/schemas/ExerciseSync"
        programs:
          type: array
          items:
            $ref: "#/components/schemas/ProgramSync"
        workoutDays:
          type: array
          items:
            $ref: "#/components/schemas/WorkoutDaySync"
        workoutDayExercises:
          type: array
          items:
            $ref: "#/components/schemas/WorkoutDayExerciseSync"
        workoutSessions:
          type: array
          items:
            $ref: "#/components/schemas/WorkoutSessionSync"
        exerciseLogs:
          type: array
          items:
            $ref: "#/components/schemas/ExerciseLogSync"
        journals:
          type: array
          items:
            $ref: "#/components/schemas/JournalSync"

    SyncResponse:
      type: object
      properties:
        success:
          type: boolean
        syncedAt:
          type: string
          format: date-time
      required:
        - success
        - syncedAt

    PushTokenRequest:
      type: object
      properties:
        token:
          type: string
      required:
        - token
